<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生鏽實驗記錄單</title>
    <!-- 使用 Tailwind CSS 打造現代化美觀介面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            transition: all 0.3s ease;
        }
        /* 錆色主題 */
        .rust-theme-border { border-color: #f97316; }
        .rust-theme-bg { background-color: #fffaf0; }
        .rust-theme-text { color: #f97316; }
        
        /* 動畫 */
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fade-in 0.5s ease-out;
        }
        
        /* 鏽蝕圖示效果 (模擬濾鏡) */
        .rust-icon-filter {
            filter: sepia(100%) saturate(300%) hue-rotate(-15deg);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-8">

    <!-- 加寬的主容器 -->
    <div class="bg-white w-full max-w-4xl rounded-2xl shadow-xl border-t-8 border-orange-500 p-6 md:p-8 transition-all duration-300">
        
        <!-- 表單標題區 (錆色圖示) -->
        <div class="text-center mb-8">
            <span class="text-5xl rust-icon-filter">⛓️⚙️🔨</span>
            <h1 class="text-2xl md:text-3xl font-bold text-slate-800 mt-2">生鏽實驗記錄單</h1>
            <p class="text-slate-500 mt-2 text-sm md:text-base">請仔細觀察實驗結果，並填寫下方紀錄單</p>
        </div>

        <!-- 學生輸入表單 -->
        <form id="experimentForm" class="space-y-6">
            
            <!-- 班級、座號與學生姓名並列 (三欄式設計) -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label for="classNum" class="block text-sm font-medium text-slate-700 mb-2">班級</label>
                    <input type="text" id="classNum" required placeholder="例如：501" 
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all">
                </div>
                <div>
                    <label for="seatNum" class="block text-sm font-medium text-slate-700 mb-2">座號</label>
                    <input type="text" id="seatNum" required placeholder="例如：23" 
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all">
                </div>
                <div>
                    <label for="name" class="block text-sm font-medium text-slate-700 mb-2">學生姓名</label>
                    <input type="text" id="name" required placeholder="請輸入姓名" 
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all">
                </div>
            </div>

            <!-- 研究假設 (新增題目) -->
            <div class="bg-blue-50 border border-blue-200 rounded-xl p-5 md:p-6">
                <label class="block text-sm font-bold text-blue-800 mb-3">🔮 研究假設</label>
                <div class="flex flex-wrap items-center gap-2 text-slate-800 text-base md:text-lg font-medium leading-loose">
                    <span>假設在</span>
                    <input type="text" id="hypothesis" required placeholder="請填寫變因環境" 
                        class="border-b-2 border-blue-400 focus:border-blue-600 bg-transparent px-3 py-1 text-center outline-none transition-all text-blue-700 font-bold placeholder-blue-300 w-full md:w-64 max-w-xs">
                    <span>的環境下，較容易生鏽。</span>
                </div>
            </div>

            <!-- 操作變因 (點選四選項) -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">操作變因</label>
                <div class="grid grid-cols-2 gap-4">
                    <!-- 水 -->
                    <label class="relative border-2 rounded-lg p-4 cursor-pointer flex items-center gap-3 transition hover:border-orange-500 hover:bg-orange-50 focus-within:ring-2 focus-within:ring-orange-500" for="variableWater">
                        <input type="radio" id="variableWater" name="variable" value="水" required class="sr-only peer">
                        <span class="text-3xl">💧</span>
                        <div>
                            <h4 class="font-bold text-slate-800 text-lg">水</h4>
                        </div>
                        <div class="absolute inset-0 border-2 border-orange-600 rounded-lg hidden peer-checked:block pointer-events-none"></div>
                    </label>
                    <!-- 空氣 -->
                    <label class="relative border-2 rounded-lg p-4 cursor-pointer flex items-center gap-3 transition hover:border-orange-500 hover:bg-orange-50 focus-within:ring-2 focus-within:ring-orange-500" for="variableAir">
                        <input type="radio" id="variableAir" name="variable" value="空氣" required class="sr-only peer">
                        <span class="text-3xl">🌬️</span>
                        <div>
                            <h4 class="font-bold text-slate-800 text-lg">空氣</h4>
                        </div>
                        <div class="absolute inset-0 border-2 border-orange-600 rounded-lg hidden peer-checked:block pointer-events-none"></div>
                    </label>
                    <!-- 酸性水溶液 -->
                    <label class="relative border-2 rounded-lg p-4 cursor-pointer flex items-center gap-3 transition hover:border-orange-500 hover:bg-orange-50 focus-within:ring-2 focus-within:ring-orange-500" for="variableAcid">
                        <input type="radio" id="variableAcid" name="variable" value="酸性水溶液" required class="sr-only peer">
                        <span class="text-3xl">🧪</span>
                        <div>
                            <h4 class="font-bold text-slate-800 text-lg">酸性水溶液</h4>
                        </div>
                        <div class="absolute inset-0 border-2 border-orange-600 rounded-lg hidden peer-checked:block pointer-events-none"></div>
                    </label>
                    <!-- 海水 -->
                    <label class="relative border-2 rounded-lg p-4 cursor-pointer flex items-center gap-3 transition hover:border-orange-500 hover:bg-orange-50 focus-within:ring-2 focus-within:ring-orange-500" for="variableSalt">
                        <input type="radio" id="variableSalt" name="variable" value="海水" required class="sr-only peer">
                        <span class="text-3xl">🌊</span>
                        <div>
                            <h4 class="font-bold text-slate-800 text-lg">海水</h4>
                        </div>
                        <div class="absolute inset-0 border-2 border-orange-600 rounded-lg hidden peer-checked:block pointer-events-none"></div>
                    </label>
                </div>
            </div>

            <!-- 哪一組生鏽較嚴重 (點選兩選項) -->
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">哪一組生鏽較嚴重？</label>
                <div class="flex gap-4">
                    <!-- 實驗組 -->
                    <label class="relative flex-1 border-2 rounded-lg p-4 cursor-pointer flex items-center gap-3 transition hover:border-orange-500 hover:bg-orange-50 focus-within:ring-2 focus-within:ring-orange-500" for="severityExp">
                        <input type="radio" id="severityExp" name="severity" value="實驗組" required class="sr-only peer">
                        <span class="text-3xl">🧡</span>
                        <div>
                            <h4 class="font-bold text-slate-800 text-lg">實驗組</h4>
                        </div>
                        <div class="absolute inset-0 border-2 border-orange-600 rounded-lg hidden peer-checked:block pointer-events-none"></div>
                    </label>
                    <!-- 對照組 -->
                    <label class="relative flex-1 border-2 rounded-lg p-4 cursor-pointer flex items-center gap-3 transition hover:border-orange-500 hover:bg-orange-50 focus-within:ring-2 focus-within:ring-orange-500" for="severityCtrl">
                        <input type="radio" id="severityCtrl" name="severity" value="對照組" required class="sr-only peer">
                        <span class="text-3xl">⚙️</span>
                        <div>
                            <h4 class="font-bold text-slate-800 text-lg">對照組</h4>
                        </div>
                        <div class="absolute inset-0 border-2 border-orange-600 rounded-lg hidden peer-checked:block pointer-events-none"></div>
                    </label>
                </div>
            </div>

            <!-- 實驗結論 (點選兩選項二選一) -->
            <div class="bg-orange-50 border border-orange-200 rounded-xl p-5 md:p-6 space-y-4">
                <label class="block text-sm font-bold text-orange-800 mb-1">💡 實驗結論</label>
                
                <div class="space-y-3">
                    <!-- 選項一：假設成立 -->
                    <label class="relative block border-2 border-slate-200 bg-white rounded-lg p-4 cursor-pointer transition hover:border-orange-500 hover:bg-orange-50 focus-within:ring-2 focus-within:ring-orange-500" for="conclusionSetup1">
                        <input type="radio" id="conclusionSetup1" name="conclusionType" value="成立" required class="sr-only peer">
                        <div class="flex flex-col md:flex-row md:items-center gap-3">
                            <div class="flex items-center gap-2">
                                <span class="text-xl">✅</span>
                                <span class="font-bold text-slate-800 text-base">假設成立，</span>
                            </div>
                            <div class="flex flex-wrap items-center gap-2 text-slate-700 text-sm md:text-base ml-7 md:ml-0">
                                <span>在</span>
                                <input type="text" id="conclusionEnv" placeholder="請填寫變因環境" 
                                    class="border-b-2 border-orange-400 focus:border-orange-600 bg-transparent px-2 py-0.5 text-center outline-none transition-all text-orange-700 font-bold placeholder-orange-300 w-full md:w-48 max-w-xs">
                                <span>的環境下，較容易生鏽。</span>
                            </div>
                        </div>
                        <div class="absolute inset-0 border-2 border-orange-600 rounded-lg hidden peer-checked:block pointer-events-none"></div>
                    </label>

                    <!-- 選項二：假設不成立 -->
                    <label class="relative block border-2 border-slate-200 bg-white rounded-lg p-4 cursor-pointer transition hover:border-orange-500 hover:bg-orange-50 focus-within:ring-2 focus-within:ring-orange-500" for="conclusionSetup2">
                        <input type="radio" id="conclusionSetup2" name="conclusionType" value="不成立" required class="sr-only peer">
                        <div class="flex items-center gap-2">
                            <span class="text-xl">❌</span>
                            <span class="font-bold text-slate-800 text-base">假設不成立，需再探討。</span>
                        </div>
                        <div class="absolute inset-0 border-2 border-orange-600 rounded-lg hidden peer-checked:block pointer-events-none"></div>
                    </label>
                </div>
            </div>

            <!-- 困難與反思 -->
            <div>
                <label for="reflection" class="block text-sm font-medium text-slate-700 mb-2">困難與反思</label>
                <textarea id="reflection" required placeholder="請寫下你在實驗中遇到的困難、解決方法或心得反思..." rows="4"
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all resize-y"></textarea>
            </div>

            <!-- 送出按鈕 -->
            <button type="submit" id="submitBtn" 
                class="w-full bg-orange-500 hover:bg-orange-600 active:scale-[0.98] text-white font-bold py-4 px-6 rounded-lg shadow-md transition-all flex items-center justify-center gap-2 text-lg">
                <span>🚀</span> 送出紀錄單
            </button>
        </form>

        <!-- 自訂錯誤訊息框 (取代 Alert) -->
        <div id="errorAlert" class="hidden mt-4 p-4 bg-rose-50 border border-rose-200 text-rose-800 rounded-lg flex items-center gap-2">
            <span>❌</span>
            <span id="errorText" class="text-sm">傳送失敗，請重試。</span>
        </div>

        <!-- 成功送出畫面 (保持隱藏) -->
        <div id="successMsg" class="hidden text-center py-12 px-4 space-y-4 animate-fade-in">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-orange-100 text-orange-500 rounded-full text-4xl mb-2 animate-bounce rust-icon-filter">
                🎉⛓️
            </div>
            <h2 class="text-2xl font-bold text-slate-800">太棒了！</h2>
            <p class="text-slate-600 text-lg">你的生鏽實驗紀錄單已成功送出！</p>
            <p class="text-slate-400 text-sm">數據已同步紀錄至老師的雲端試算表中。</p>
            <button onclick="window.location.reload();" 
                class="mt-6 px-6 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium rounded-full text-sm transition-all">
                再填一份
            </button>
        </div>

    </div>

    <script>
        // 🔗 您的新版 Google Apps Script 網頁應用程式網址 (已更新為最新指向)
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzh6kE1gjYmC5E1tnNcKGVAevQsZpq-WpMrOtBToRYInlpB5OoeZlPONjoFvPFFTjWPnA/exec';

        // 💡 結論選項之互動邏輯控制
        const conclusionTypeRadios = document.querySelectorAll('input[name="conclusionType"]');
        const conclusionEnvInput = document.getElementById('conclusionEnv');

        conclusionTypeRadios.forEach(radio => {
            radio.addEventListener('change', function() {
                if (document.getElementById('conclusionSetup1').checked) {
                    conclusionEnvInput.required = true;
                    conclusionEnvInput.disabled = false;
                    conclusionEnvInput.focus();
                } else {
                    conclusionEnvInput.required = false;
                    conclusionEnvInput.disabled = true;
                    conclusionEnvInput.value = ''; // 清空輸入框
                }
            });
        });

        // 點擊選項框內輸入欄位時，避免不必要的 Radio 重複切換
        conclusionEnvInput.addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('conclusionSetup1').checked = true;
            conclusionEnvInput.required = true;
            conclusionEnvInput.disabled = false;
        });

        document.getElementById('experimentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMsg');
            const form = document.getElementById('experimentForm');
            const errorAlert = document.getElementById('errorAlert');
            const errorText = document.getElementById('errorText');
            
            // 隱藏先前的錯誤
            errorAlert.classList.add('hidden');
            
            // 1. 鎖定按鈕並顯示傳送中
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span>⏳</span> 紀錄單傳送中...';
            submitBtn.classList.remove('bg-orange-500', 'hover:bg-orange-600');
            submitBtn.classList.add('bg-slate-400', 'cursor-not-allowed');
            
            // 2. 獲取資料
            const classVal = document.getElementById('classNum').value.trim();
            const seatVal = document.getElementById('seatNum').value.trim();
            
            // 將座號自動補零，與班級合併，以維持對舊有 GAS classId 欄位的向後相容
            const paddedSeat = seatVal.padStart(2, '0');
            const combinedClassId = classVal + paddedSeat;

            const variableValue = document.querySelector('input[name="variable"]:checked').value;
            const severityValue = document.querySelector('input[name="severity"]:checked').value;

            // 根據結論的選擇建構送出的結論字串
            let conclusionString = '';
            const chosenConclusionType = document.querySelector('input[name="conclusionType"]:checked').value;
            if (chosenConclusionType === '成立') {
                const env = conclusionEnvInput.value.trim();
                conclusionString = `假設成立，在 ${env} 的環境下，較容易生鏽。`;
            } else {
                conclusionString = '假設不成立，需再探討。';
            }

            const payload = {
                classId: combinedClassId, // 相容舊版欄位
                class: classVal,          // 班級
                seat: seatVal,            // 座號
                name: document.getElementById('name').value.trim(),
                hypothesis: document.getElementById('hypothesis').value.trim(), // 研究假設欄位
                variable: variableValue,
                severity: severityValue,
                conclusion: conclusionString, // 格式化後的結論內容
                reflection: document.getElementById('reflection').value.trim()
            };
            
            // 3. 發送資料到 Google Apps Script
            fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: {
                    'Content-Type': 'text/plain' // 避免觸發 CORS 預檢限制
                },
                mode: 'no-cors' // 配合 GAS 的轉址機制
            })
            .then(() => {
                // 4. 顯示成功畫面，隱藏表單
                form.classList.add('hidden');
                successMsg.classList.remove('hidden');
            })
            .catch(error => {
                console.error('Error:', error);
                
                // 還原按鈕狀態
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span>🚀</span> 送出紀錄單';
                submitBtn.classList.remove('bg-slate-400', 'cursor-not-allowed');
                submitBtn.classList.add('bg-orange-500', 'hover:bg-orange-600');
                
                // 顯示自訂錯誤提示
                errorText.innerText = '傳送失敗！請檢查網路連線，或通知老師確認 GAS 設定是否正確。';
                errorAlert.classList.remove('hidden');
            });
        });
    </script>
</body>
</html>
